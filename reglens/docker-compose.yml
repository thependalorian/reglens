version: "3.9"

services:
  reglens-api:
    build: .
    ports:
      - "8058:8058"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8058/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  reglens-ingest:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m ingestion.ingest --path /app/data --recursive
    profiles:
      - ingest